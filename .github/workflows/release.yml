name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          VERSION="$(date -u +%Y.%m.%d)-${SHORT_SHA}"
          if [ "${{ matrix.cross }}" = "true" ]; then
            CNCTL_VERSION="$VERSION" cross build --release --target ${{ matrix.target }}
          else
            CNCTL_VERSION="$VERSION" cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cnctl-${{ matrix.target }}.tar.gz cnctl
        shell: bash

      - name: Package (windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../cnctl-${{ matrix.target }}.zip cnctl.exe
        shell: bash

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: cnctl-${{ matrix.target }}.${{ matrix.archive }}

      - uses: actions/upload-artifact@v7
        with:
          name: cnctl-${{ matrix.target }}
          path: cnctl-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum cnctl-* > SHA256SUMS

      - name: Determine version
        id: version
        run: |
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          DATE=$(date -u +%Y.%m.%d)
          echo "tag=${DATE}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "title=cnctl ${DATE} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"
          echo "sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ steps.version.outputs.sha }}
          name: ${{ steps.version.outputs.title }}
          generate_release_notes: true
          make_latest: true
          files: |
            artifacts/cnctl-*
            artifacts/SHA256SUMS
